name: Playwright Tests

on:
  workflow_dispatch:
  schedule:
    # Every day at 10:00 AM IST (04:30 UTC)
    - cron: "30 4 * * *"
  push:
    branches:
      - main
      - master

jobs:
test:
  runs-on: ubuntu-latest
  timeout-minutes: 60

steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Setup Node
    uses: actions/setup-node@v4
    with:
      node-version: lts/*

  - name: Install Dependencies
    run: npm ci

  - name: Install Playwright Browsers
    run: npx playwright install --with-deps

  - name: Run Playwright Tests
    env:
      WORKINDIA_USERNAME: ${{ secrets.WORKINDIA_USERNAME }}
      WORKINDIA_PASSWORD: ${{ secrets.WORKINDIA_PASSWORD }}
    run: npx playwright test

  - name: Upload Playwright Report
    if: always()
    uses: actions/upload-artifact@v4
    with:
      name: playwright-report
      path: playwright-report/
      retention-days: 30

  - name: Upload Excel Reports
    if: always()
    uses: actions/upload-artifact@v4
    with:
      name: excel-reports
      path: "*.xlsx"
      retention-days: 30

  - name: Send Email Report
    if: always()
    uses: dawidd6/action-send-mail@v3
    with:
      server_address: smtp.gmail.com
      server_port: 465
      secure: true

      username: ${{ secrets.EMAIL_USERNAME }}
      password: ${{ secrets.EMAIL_PASSWORD }}

      subject: Playwright Execution Report - ${{ job.status }}

      to: ${{ secrets.TO_EMAIL }}
      from: GitHub Actions

      body: |
        Playwright execution completed.

        Status: ${{ job.status }}
        Repository: ${{ github.repository }}
        Branch: ${{ github.ref_name }}

        Run URL:
        https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      attachments: |
        *.xlsx
